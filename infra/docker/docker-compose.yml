version: '3.9'

services:
  # ─── PostgreSQL with pgvector ───
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sdlc-postgres
    environment:
      POSTGRES_DB: agentic_sdlc
      POSTGRES_USER: sdlc
      POSTGRES_PASSWORD: sdlc_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sdlc -d agentic_sdlc']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (message queue + caching) ───
  redis:
    image: redis:7-alpine
    container_name: sdlc-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible object storage) ───
  minio:
    image: minio/minio:latest
    container_name: sdlc-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  # ─── Loki (log aggregation) ───
  loki:
    image: grafana/loki:2.9.0
    container_name: sdlc-loki
    ports:
      - '3100:3100'
    volumes:
      - loki_data:/loki

  # ─── Grafana (monitoring dashboards) ───
  grafana:
    image: grafana/grafana:latest
    container_name: sdlc-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - '3001:3000'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  postgres_data:
  redis_data:
  minio_data:
  loki_data:
  grafana_data:
